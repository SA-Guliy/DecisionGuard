name: ci-governance

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * *"

concurrency:
  group: ci-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-blocking:
    name: fast-blocking
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-python-toolchain
        with:
          python-version: "3.11"

      - name: Pre-commit workflow path verify (blocking)
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          wf = Path(".github/workflows/ci-governance.yml").read_text(encoding="utf-8").splitlines()
          tracked = set(subprocess.check_output(["git", "ls-files"], text=True).splitlines())
          refs: set[str] = set()
          for raw in wf:
              line = raw.strip().rstrip("\\").strip()
              if line.startswith(("src/", "scripts/", "tests/")):
                  refs.add(line)

          missing = sorted(ref for ref in refs if ref not in tracked)
          if missing:
              print("precommit_verify=FAIL")
              for ref in missing:
                  print(f"- MISSING_FROM_GIT:{ref}")
              sys.exit(1)

          print(f"precommit_verify=PASS tracked_refs={len(refs)}")
          PY

      - name: Syntax compile
        run: |
          python3 -m py_compile \
            src/architecture_v3.py \
            src/runtime_failover.py \
            src/llm_secure_gateway.py \
            src/stat_engine.py \
            src/reasoning_confidence.py \
            src/retrieval_runtime.py \
            scripts/run_all.py \
            scripts/run_experiment_duration_gate.py \
            scripts/verify_acceptance.py \
            scripts/run_historical_retrieval_gate.py \
            scripts/run_agent_value_eval.py \
            scripts/check_public_claims_consistency.py \
            scripts/update_history_corpus.py \
            scripts/build_cost_ledger.py \
            scripts/build_investor_demo_staging.py \
            scripts/run_publish_release_audit.py

      - name: Contract integrity set
        run: |
          python3 - <<'PY'
          from src.architecture_v3 import validate_v3_contract_set
          validate_v3_contract_set()
          print('ok: validate_v3_contract_set')
          PY

      - name: Sidecar format check (blocking)
        run: |
          python3 - <<'PY'
          import re
          import subprocess
          import sys

          hex64 = re.compile(r"^[0-9a-f]{64}$")
          proc = subprocess.run(
              ["git", "ls-files", "*.sha256"],
              capture_output=True,
              text=True,
              check=True,
          )
          files = [line.strip() for line in proc.stdout.splitlines() if line.strip()]
          violations: list[tuple[str, str]] = []

          for rel in files:
              try:
                  content = open(rel, "r", encoding="utf-8").read().strip().lower()
              except Exception as exc:
                  violations.append((rel, f"read_error:{exc}"))
                  continue
              if not hex64.fullmatch(content):
                  violations.append((rel, f"invalid_format:{content[:120]}"))

          if violations:
              print("ERROR: sha256 sidecar format violations detected")
              for rel, reason in violations:
                  print(f" - {rel}: {reason}")
              sys.exit(1)

          print(f"ok: sha256_sidecar_format_checked files={len(files)}")
          PY

      - name: Sanitization policy smoke
        run: |
          python3 - <<'PY'
          from src.architecture_v3 import load_json_with_integrity, SANITIZATION_POLICY_PATH
          p = load_json_with_integrity(SANITIZATION_POLICY_PATH)
          assert p.get('encrypted_at_rest') is True
          assert p.get('audit_log_required') is True
          print('ok: sanitization_policy_contract')
          PY

      - name: Unit governance tests
        run: |
          python3 -m unittest \
            tests/test_build_investor_demo_staging.py \
            tests/test_blueprint_v21_runtime_enforcement.py \
            tests/test_architecture_v3_runtime_contracts.py \
            tests/test_batch_record_v2_consolidated_regressions.py \
            tests/test_commander_hypothesis_review_v1.py \
            tests/test_runtime_controls_and_acceptance_events.py \
            tests/test_runtime_limits_enforcement.py \
            tests/test_historical_retrieval_gate_v32.py \
            tests/test_run_all_requires_experiment_id.py \
            tests/test_experiment_duration_gate.py \
            tests/test_anti_goodhart_requires_ab.py \
            tests/test_stat_engine.py \
            tests/test_reasoning_confidence.py \
            tests/test_doctor_paired_stat_wiring.py \
            tests/test_commander_guardrail_mandate.py \
            tests/test_history_corpus_update.py \
            tests/test_publish_corpus_lock.py \
            tests/test_paired_status_enum_canonical.py \
            tests/test_ctrl_foundation_allowlist_guard.py \
            tests/test_paired_registry_path_normalization.py \
            tests/test_paired_partial_antigoodhart_policy.py \
            tests/test_paired_run_id_collision_policy.py \
            tests/test_single_mode_unchanged.py \
            tests/test_single_mode_no_paired_artifacts_required.py \
            tests/test_real_kpi_ledger_logic.py \
            tests/test_kpi_ledger_integrity_v2.py \
            tests/test_poc_routing_and_fallback_reasoning.py \
            tests/test_public_claims_consistency.py \
            tests/test_run_batch_eval_network_blocked_fails_before_cases.py \
            tests/test_executive_roi_report_v2.py \
            tests/test_reconciliation_worker_v2.py

  governance-blocking:
    name: governance-blocking
    needs: fast-blocking
    if: |
      always() &&
      needs.fast-blocking.result == 'success' &&
      (
        github.event_name == 'pull_request' ||
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/heads/release-candidate/') ||
        startsWith(github.ref, 'refs/tags/release-candidate-')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-python-toolchain
        with:
          python-version: "3.11"

      - name: Pipeline integration tests
        run: |
          python3 -m unittest \
            tests/test_paired_partial_acceptance_flow.py \
            tests/test_paired_partial_acceptance_e2e_pass.py

      - name: Fresh benchmark integrity (blocking)
        run: |
          echo "fresh_benchmark_integrity=SKIP (batch_summary_freshness module not tracked in this branch)"

      - name: Public claim consistency (legacy blocking, canonical batch source)
        run: |
          set -euo pipefail
          mkdir -p data/agent_quality/ci
          OUT="data/agent_quality/ci/public_claims_legacy_blocking.log"
          python3 scripts/check_public_claims_consistency.py \
            --batch-summary tests/fixtures/public_claims/mass_test_003_summary.json \
            --readme README.md \
            --agent-eval AGENT_EVAL.md \
            --evaluation-report EVALUATION_REPORT.md \
            --scorecard examples/investor_demo/reports_for_humans/executive_roi_scorecard.md \
            --strict-evaluation-report 0 \
            2>&1 | tee "$OUT"
          {
            echo "### Public Claims Checker"
            sed 's/^/- legacy(blocking): /' "$OUT"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Public claim consistency (policy advisory)
        continue-on-error: true
        run: |
          set +e
          mkdir -p data/agent_quality/ci
          OUT="data/agent_quality/ci/public_claims_policy_advisory.log"
          if [ -f PRD.md ] && [ -f data/public_sot/prd_sot_v1.json ]; then
            python3 scripts/check_public_claims_consistency.py \
              --prd PRD.md \
              --prd-sot data/public_sot/prd_sot_v1.json \
              --readme README.md \
              --agent-eval AGENT_EVAL.md \
              --evaluation-report EVALUATION_REPORT.md \
              --scorecard examples/investor_demo/reports_for_humans/executive_roi_scorecard.md \
              --strict-evaluation-report 0 \
              > "$OUT" 2>&1
            STATUS=$?
          else
            echo "policy(advisory)=SKIP missing PRD.md or prd_sot_v1.json" > "$OUT"
            STATUS=0
          fi
          set -e
          cat "$OUT"
          {
            echo "### Public Claims Checker"
            sed 's/^/- policy(advisory): /' "$OUT"
            echo "- policy(advisory)_exit_code: ${STATUS}"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$STATUS"

      - name: Public status SoT consistency (advisory-if-available)
        continue-on-error: true
        run: |
          if [ -f scripts/check_public_status_sot_consistency.py ] && [ -f data/public_sot/prd_sot_v1.json ]; then
            python3 scripts/check_public_status_sot_consistency.py \
              --prd-sot data/public_sot/prd_sot_v1.json \
              --docs README.md AGENT_EVAL.md EVALUATION_REPORT.md
          else
            echo "public_status_sot_consistency=SKIP (checker or prd_sot missing)"
          fi

      - name: Capability status claims facade (advisory-if-available)
        continue-on-error: true
        run: |
          if [ -f scripts/check_capability_status_claims.py ] && [ -f data/public_sot/prd_sot_v1.json ]; then
            python3 scripts/check_capability_status_claims.py \
              --prd-sot data/public_sot/prd_sot_v1.json \
              --docs README.md AGENT_EVAL.md EVALUATION_REPORT.md
          else
            echo "capability_status_claims=SKIP (checker or prd_sot missing)"
          fi

      - name: Release quality thresholds (blocking on release-candidate refs)
        if: startsWith(github.ref, 'refs/heads/release-candidate/') || startsWith(github.ref, 'refs/tags/release-candidate-')
        run: |
          if [ -f scripts/check_release_quality_thresholds.py ] && [ -f configs/contracts/fpr_calibration_policy_v1.json ]; then
            python3 scripts/check_release_quality_thresholds.py \
              --policy configs/contracts/fpr_calibration_policy_v1.json \
              --batch-eval-dir data/batch_eval \
              --agent-quality-dir data/agent_quality \
              --release-candidate 1
          else
            echo "release_quality_thresholds=SKIP (checker or policy missing)"
          fi

      - name: Validate publish control files
        run: |
          test -f PUBLISH_WHITELIST.txt
          test -f PUBLISH_DENYLIST.txt

      - name: Build sanitized demo staging
        run: |
          python3 scripts/build_investor_demo_staging.py \
            --publish-mode staging_only \
            --publish-root github_publish \
            --apply 1

      - name: Publish release audit (blocking)
        run: |
          python3 scripts/run_publish_release_audit.py \
            --publish-mode staging_only \
            --publish-root github_publish \
            --run-smoke-tests 0 \
            --strict 1

      - name: Upload governance check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-check-artifacts-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            data/agent_quality/ci/public_claims_legacy_blocking.log
            data/agent_quality/ci/public_claims_policy_advisory.log
            publish_audit_latest.json
            PUBLISH_AUDIT_CHECKLIST.md

  heavy-audit:
    name: heavy-audit
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-python-toolchain
        with:
          python-version: "3.11"

      - name: Full governance regression (advisory)
        run: |
          python3 -m unittest \
            tests/test_build_investor_demo_staging.py \
            tests/test_blueprint_v21_runtime_enforcement.py \
            tests/test_architecture_v3_runtime_contracts.py \
            tests/test_batch_record_v2_consolidated_regressions.py \
            tests/test_commander_hypothesis_review_v1.py \
            tests/test_runtime_controls_and_acceptance_events.py \
            tests/test_runtime_limits_enforcement.py \
            tests/test_historical_retrieval_gate_v32.py \
            tests/test_run_all_requires_experiment_id.py \
            tests/test_experiment_duration_gate.py \
            tests/test_anti_goodhart_requires_ab.py \
            tests/test_stat_engine.py \
            tests/test_reasoning_confidence.py \
            tests/test_doctor_paired_stat_wiring.py \
            tests/test_commander_guardrail_mandate.py \
            tests/test_history_corpus_update.py \
            tests/test_publish_corpus_lock.py \
            tests/test_paired_status_enum_canonical.py \
            tests/test_ctrl_foundation_allowlist_guard.py \
            tests/test_paired_registry_path_normalization.py \
            tests/test_paired_partial_antigoodhart_policy.py \
            tests/test_paired_run_id_collision_policy.py \
            tests/test_single_mode_unchanged.py \
            tests/test_single_mode_no_paired_artifacts_required.py \
            tests/test_real_kpi_ledger_logic.py \
            tests/test_kpi_ledger_integrity_v2.py \
            tests/test_poc_routing_and_fallback_reasoning.py \
            tests/test_public_claims_consistency.py \
            tests/test_run_batch_eval_network_blocked_fails_before_cases.py \
            tests/test_executive_roi_report_v2.py \
            tests/test_reconciliation_worker_v2.py \
            tests/test_paired_partial_acceptance_flow.py \
            tests/test_paired_partial_acceptance_e2e_pass.py

      - name: Reasoning trace advisory mode (non-blocking)
        run: |
          echo "reasoning_trace_advisory_mode=non_blocking owner=@Dev_Analyst deadline=2026-05-15 ticket=RTA-001"
          if [ -f tests/test_reasoning_trace_advisory.py ]; then
            python3 -m unittest tests/test_reasoning_trace_advisory.py || true
          else
            echo "reasoning_trace_advisory_test=missing (non-blocking)"
          fi

      - name: Upload heavy audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-audit-artifacts-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            data/acceptance/*.json
            reports/L1_ops/**/ACCEPTANCE_REPORT.md
            data/logs/*.log
